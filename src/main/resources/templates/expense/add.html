<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'expenses', 'Add Expense')}">
<body>

<th:block th:fragment="content">

<div th:replace="~{fragments/breadcrumb :: breadcrumb('Expenses', 'Add Expense')}"></div>

<h2 style="margin-bottom: 24px;">Add Expense</h2>

<div class="card" style="max-width: 560px;">
    <form th:action="@{/expenses/add}" method="post" data-validate>

        <div class="form-group">
            <label class="form-label">Category</label>
            <div class="input-group">
                <span data-lucide="tag"></span>
                <input type="text" name="category" required placeholder="Food & Drinks"/>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" name="title" required class="form-control" placeholder="Burger King"/>
        </div>

        <div class="d-flex gap-3">
            <div class="form-group" style="flex:1;">
                <label class="form-label">Amount</label>
                <input type="number" step="0.01" name="amount" required class="form-control" placeholder="280.00"/>
            </div>
            <div class="form-group" style="flex:1;">
                <label class="form-label">Date</label>
                <input type="date" name="date" required class="form-control"/>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Payment Method</label>
            <input type="text" name="paymentMethod" class="form-control" placeholder="bKash / Cash / Card"/>
        </div>

        <div class="form-group">
            <label class="form-label">Description (Optional)</label>
            <input type="text" name="description" class="form-control" placeholder="Lunch with friends"/>
        </div>

        <div class="form-group">
            <label class="form-label">Upload Receipt (Optional)</label>
            <input type="file" name="receipt" class="form-control"/>
        </div>

        <div class="d-flex gap-3" style="margin-top: 8px;">
            <a th:href="@{/expenses}" class="btn btn-secondary btn-block">Cancel</a>
            <button type="submit" class="btn btn-primary btn-block">Save Expense</button>
        </div>

    </form>
</div>

</th:block>

</body>
</html>
