<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'expenses', 'Expenses')}">
<body>

<th:block th:fragment="content">

<div th:replace="~{fragments/breadcrumb :: breadcrumb('Dashboard', 'Expenses')}"></div>

<div class="dashboard-header">
    <h2>Expenses</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
        <span data-lucide="plus"></span> Add Expense
    </button>
</div>

<div class="card" style="margin-bottom: 24px;">
    <div class="d-flex gap-3 align-center" style="flex-wrap: wrap;">
        <div class="input-group" style="flex:1; min-width: 220px;">
            <span data-lucide="search"></span>
            <input type="text" placeholder="Search expenses..."/>
        </div>
        <button class="btn btn-secondary"><span data-lucide="filter"></span> Filter</button>
    </div>
</div>

<div class="table-card">
    <table class="spendwise-table">
        <thead>
        <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Title</th>
            <th>Amount</th>
            <th>Payment</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td colspan="6">
                <div class="empty-state">
                    <span data-lucide="receipt" style="font-size: 32px; color: var(--color-text-muted);"></span>
                    <h4>No expenses recorded yet</h4>
                    <p class="text-muted">Start tracking your spending by adding your first expense.</p>
                    <button class="btn btn-primary" style="margin-top: 16px;" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
                        Add Expense
                    </button>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{fragments/modal :: modal('addExpenseModal', 'Add Expense')}"></div>

</th:block>

</body>
</html>
