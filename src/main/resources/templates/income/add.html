<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'income', 'Add Income')}">
<body>

<th:block th:fragment="content">

<div th:replace="~{fragments/breadcrumb :: breadcrumb('Income', 'Add Income')}"></div>

<h2 style="margin-bottom: 24px;">Add Income</h2>

<div class="card" style="max-width: 560px;">
    <form th:action="@{/income/add}" method="post" data-validate>

        <div class="form-group">
            <label class="form-label">Source</label>
            <input type="text" name="source" required class="form-control" placeholder="Part-time Job / Scholarship / Parents"/>
        </div>

        <div class="d-flex gap-3">
            <div class="form-group" style="flex:1;">
                <label class="form-label">Amount</label>
                <input type="number" step="0.01" name="amount" required class="form-control" placeholder="2500.00"/>
            </div>
            <div class="form-group" style="flex:1;">
                <label class="form-label">Date</label>
                <input type="date" name="date" required class="form-control"/>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Description (Optional)</label>
            <input type="text" name="description" class="form-control" placeholder="Freelance Work"/>
        </div>

        <div class="d-flex gap-3" style="margin-top: 8px;">
            <a th:href="@{/income}" class="btn btn-secondary btn-block">Cancel</a>
            <button type="submit" class="btn btn-primary btn-block">Save Income</button>
        </div>

    </form>
</div>

</th:block>

</body>
</html>
