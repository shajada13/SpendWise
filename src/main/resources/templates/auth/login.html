<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/auth :: layout(~{::content}, 'Log In')}">
<body>

<th:block th:fragment="content">
<div class="auth-page">
    <div class="auth-card">

        <div class="auth-brand">
            <img th:src="@{/images/logo/logo-mark.svg}" width="32" height="32" alt="SpendWise"/>
            <span>SpendWise</span>
        </div>

        <h2>Welcome Back! 👋</h2>
        <p style="margin-top:4px;">Log in to your account</p>

        <form th:action="@{/login}" method="post" data-validate style="margin-top: 24px;">

            <div class="form-group">
                <label class="form-label">Email or Username</label>
                <div class="input-group">
                    <span data-lucide="mail"></span>
                    <input type="text" name="username" required placeholder="you@university.edu"/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span data-lucide="lock"></span>
                    <input type="password" name="password" required placeholder="••••••••"/>
                </div>
            </div>

            <div class="d-flex justify-between align-center" style="margin-bottom: 20px;">
                <label class="form-check">
                    <input type="checkbox" name="rememberMe"/> Remember Me
                </label>
                <a th:href="@{/forgot-password}" style="font-size: var(--font-size-sm);">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">Log In</button>
        </form>

        <div class="auth-divider">or continue with</div>

        <div class="social-login">
            <button class="btn btn-secondary">Google</button>
            <button class="btn btn-secondary">Facebook</button>
            <button class="btn btn-secondary"><span data-lucide="github"></span> GitHub</button>
        </div>

        <p style="text-align:center; margin-top: 24px; font-size: var(--font-size-sm);">
            Don't have an account? <a th:href="@{/register}">Register</a>
        </p>

    </div>
</div>
</th:block>

</body>
</html>
