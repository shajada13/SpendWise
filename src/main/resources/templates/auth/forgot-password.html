<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/auth :: layout(~{::content}, 'Forgot Password')}">
<body>

<th:block th:fragment="content">
<div class="auth-page">
    <div class="auth-card">

        <div style="display:flex; justify-content:center; margin-bottom: 20px;">
            <div style="width:72px;height:72px;border-radius:50%;background:var(--color-primary-light);display:flex;align-items:center;justify-content:center;">
                <span data-lucide="lock" style="color:var(--color-primary);"></span>
            </div>
        </div>

        <h2 style="text-align:center;">Forgot Password?</h2>
        <p style="text-align:center; margin-top:4px;">No worries! Enter your email and we'll send you a link to reset your password.</p>

        <form th:action="@{/forgot-password}" method="post" data-validate style="margin-top: 24px;">

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span data-lucide="mail"></span>
                    <input type="email" name="email" required placeholder="you@university.edu"/>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">Send Reset Link</button>
        </form>

        <p style="text-align:center; margin-top: 24px; font-size: var(--font-size-sm);">
            Remember your password? <a th:href="@{/login}">Log in</a>
        </p>

    </div>
</div>
</th:block>

</body>
</html>
