<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'savings', 'Savings Goals')}">
<body>

<th:block th:fragment="content">

<div th:replace="~{fragments/breadcrumb :: breadcrumb('Dashboard', 'Savings Goals')}"></div>

<div class="dashboard-header">
    <h2>Savings Goals</h2>
    <button class="btn btn-primary"><span data-lucide="plus"></span> Add Goal</button>
</div>

<div class="widgets-grid">
    <div class="card">
        <div class="card-header">
            <h4>New Laptop</h4>
            <span class="badge badge-primary">50%</span>
        </div>
        <div class="progress-track" style="margin-bottom: 8px;"><div class="progress-fill" style="width:50%;"></div></div>
        <span class="text-muted">৳ 15,000 of ৳ 30,000</span>
    </div>

    <div class="card">
        <div class="card-header">
            <h4>Trip to Cox's Bazar</h4>
            <span class="badge badge-warning">45%</span>
        </div>
        <div class="progress-track" style="margin-bottom: 8px;"><div class="progress-fill warning" style="width:45%;"></div></div>
        <span class="text-muted">৳ 4,500 of ৳ 10,000</span>
    </div>

    <div class="card">
        <div class="card-header">
            <h4>Emergency Fund</h4>
            <span class="badge badge-success">40%</span>
        </div>
        <div class="progress-track" style="margin-bottom: 8px;"><div class="progress-fill success" style="width:40%;"></div></div>
        <span class="text-muted">৳ 8,000 of ৳ 20,000</span>
    </div>
</div>

</th:block>

</body>
</html>
