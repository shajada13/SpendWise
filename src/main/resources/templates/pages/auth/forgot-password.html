<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendWise — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/static/css/auth/auth.css}" href="../../static/css/auth/auth.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-container" style="max-width:480px;min-height:unset">
    <div class="auth-form-panel" style="padding:48px 48px">

      <!-- Back button -->
      <a href="/login" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-medium);text-decoration:none;margin-bottom:24px;transition:color 0.2s" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-medium)'">
        <i class="fa-solid fa-arrow-left" style="font-size:12px"></i> Back to Login
      </a>

      <!-- Icon -->
      <div style="width:64px;height:64px;background:var(--primary-light);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:20px">
        <i class="fa-solid fa-lock-open" style="font-size:28px;color:var(--primary)"></i>
      </div>

      <h1 class="auth-form-title">Forgot Password?</h1>
      <p class="auth-form-sub">No worries! Enter your email and we'll send you a reset link.</p>

      <div id="alert-container"></div>

      <!-- Success state (hidden initially) -->
      <div id="success-state" style="display:none;text-align:center;padding:20px 0">
        <div style="width:72px;height:72px;background:#ECFDF5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
          <i class="fa-solid fa-envelope-circle-check" style="font-size:32px;color:#10B981"></i>
        </div>
        <h2 style="font-size:18px;font-weight:600;color:var(--text-dark);margin-bottom:8px">Check your email</h2>
        <p style="font-size:13px;color:var(--text-medium);margin-bottom:20px" id="success-email-msg">
          We have sent a password reset link to your email.
        </p>
        <p style="font-size:12px;color:var(--text-light)">
          Didn't receive the email?
          <button onclick="resendEmail()" style="background:none;border:none;color:var(--primary);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit">
            Resend
          </button>
        </p>
        <a href="/login" class="btn-primary" style="display:flex;margin-top:20px;text-decoration:none;justify-content:center">
          Back to Login
        </a>
      </div>

      <!-- Form state -->
      <div id="form-state">
        <form id="forgot-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon-left"><i class="fa-regular fa-envelope"></i></span>
              <input class="form-input" type="email" id="email" name="email"
                     placeholder="Enter your registered email" autocomplete="email" required/>
            </div>
            <div class="field-error" id="email-error">
              <i class="fa-solid fa-circle-exclamation"></i><span></span>
            </div>
          </div>

          <button type="submit" class="btn-primary" id="send-btn">
            <span class="btn-text"><i class="fa-regular fa-paper-plane" style="margin-right:6px"></i>Send Reset Link</span>
            <span class="btn-spinner"></span>
          </button>
        </form>

        <div class="auth-switch" style="margin-top:16px">
          Remember your password? <a href="/login">Login</a>
        </div>
      </div>

    </div>
  </div>
</div>

<script th:src="@{/static/js/auth/auth-utils.js}" src="../../static/js/auth/auth-utils.js"></script>
<script th:src="@{/static/js/auth/forgot-password.js}" src="../../static/js/auth/forgot-password.js"></script>
</body>
</html>
