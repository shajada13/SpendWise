<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendWise — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/static/css/auth/auth.css}" href="../../static/css/auth/auth.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-container" style="max-width:480px;min-height:unset">
    <div class="auth-form-panel" style="padding:48px">

      <!-- Icon -->
      <div style="width:64px;height:64px;background:var(--primary-light);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:20px">
        <i class="fa-solid fa-key" style="font-size:28px;color:var(--primary)"></i>
      </div>

      <h1 class="auth-form-title">Set New Password</h1>
      <p class="auth-form-sub">Your new password must be at least 8 characters long.</p>

      <div id="alert-container"></div>

      <!-- Success state -->
      <div id="success-state" style="display:none;text-align:center;padding:20px 0">
        <div style="width:72px;height:72px;background:#ECFDF5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
          <i class="fa-solid fa-circle-check" style="font-size:32px;color:#10B981"></i>
        </div>
        <h2 style="font-size:18px;font-weight:600;color:var(--text-dark);margin-bottom:8px">Password Reset!</h2>
        <p style="font-size:13px;color:var(--text-medium);margin-bottom:20px">
          Your password has been reset successfully. You can now login with your new password.
        </p>
        <a href="/login" class="btn-primary" style="display:flex;text-decoration:none;justify-content:center">
          Back to Login
        </a>
      </div>

      <!-- Form state -->
      <div id="form-state">
        <form id="reset-form" novalidate>
          <input type="hidden" name="token" th:value="${param.token}" id="reset-token"/>

          <!-- New Password -->
          <div class="form-group">
            <label class="form-label" for="newPassword">New Password</label>
            <div class="input-wrapper">
              <span class="input-icon-left"><i class="fa-solid fa-lock"></i></span>
              <input class="form-input" type="password" id="newPassword" name="newPassword"
                     placeholder="Enter new password" autocomplete="new-password" required/>
              <button type="button" class="input-icon-right" id="toggle-new"
                      onclick="togglePassword('newPassword','toggle-new')" aria-label="Toggle">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <div class="field-error" id="newPassword-error">
              <i class="fa-solid fa-circle-exclamation"></i><span></span>
            </div>
            <div class="password-strength" id="strength-container" style="display:none">
              <div class="strength-bars">
                <div class="strength-bar" id="bar-1"></div>
                <div class="strength-bar" id="bar-2"></div>
                <div class="strength-bar" id="bar-3"></div>
              </div>
              <div class="strength-text" id="strength-text"></div>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm New Password</label>
            <div class="input-wrapper">
              <span class="input-icon-left"><i class="fa-solid fa-lock"></i></span>
              <input class="form-input" type="password" id="confirmPassword" name="confirmPassword"
                     placeholder="Confirm new password" autocomplete="new-password" required/>
              <button type="button" class="input-icon-right" id="toggle-confirm"
                      onclick="togglePassword('confirmPassword','toggle-confirm')" aria-label="Toggle">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <div class="field-error" id="confirmPassword-error">
              <i class="fa-solid fa-circle-exclamation"></i><span></span>
            </div>
          </div>

          <!-- Password requirements hint -->
          <div style="background:#F9FAFB;border-radius:8px;padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--text-medium)">
            <div style="font-weight:500;margin-bottom:6px;color:var(--text-dark)">Password requirements:</div>
            <div id="req-length"  class="req-item"><i class="fa-regular fa-circle" style="margin-right:6px"></i>At least 8 characters</div>
            <div id="req-upper"   class="req-item"><i class="fa-regular fa-circle" style="margin-right:6px"></i>One uppercase letter</div>
            <div id="req-number"  class="req-item"><i class="fa-regular fa-circle" style="margin-right:6px"></i>One number</div>
            <div id="req-special" class="req-item"><i class="fa-regular fa-circle" style="margin-right:6px"></i>One special character</div>
          </div>

          <button type="submit" class="btn-primary" id="reset-btn">
            <span class="btn-text"><i class="fa-solid fa-key" style="margin-right:6px"></i>Reset Password</span>
            <span class="btn-spinner"></span>
          </button>
        </form>
      </div>

    </div>
  </div>
</div>

<style>
.req-item { padding: 2px 0; transition: color 0.2s; }
.req-item.met { color: #10B981; }
.req-item.met i::before { content: "\f058"; font-family: "Font Awesome 6 Free"; font-weight: 900; }
</style>

<script th:src="@{/static/js/auth/auth-utils.js}" src="../../static/js/auth/auth-utils.js"></script>
<script th:src="@{/static/js/auth/reset-password.js}" src="../../static/js/auth/reset-password.js"></script>
</body>
</html>
