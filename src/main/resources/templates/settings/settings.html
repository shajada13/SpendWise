<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'settings', 'Settings')}">
<body>

<th:block th:fragment="content">

<div th:replace="~{fragments/breadcrumb :: breadcrumb('Dashboard', 'Settings')}"></div>

<h2 style="margin-bottom: 24px;">Settings</h2>

<div class="card" style="max-width: 640px; margin-bottom: 24px;">
    <div class="card-header"><h4>Change Password</h4></div>
    <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" class="form-control"/>
    </div>
    <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control"/>
    </div>
    <button class="btn btn-primary">Update Password</button>
</div>

<div class="card" style="max-width: 640px; margin-bottom: 24px;">
    <div class="card-header"><h4>Preferences</h4></div>
    <div class="form-group">
        <label class="form-label">Theme</label>
        <select class="form-control"><option>Light</option><option>Dark</option></select>
    </div>
    <div class="form-group">
        <label class="form-label">Currency</label>
        <select class="form-control"><option>BDT</option><option>USD</option></select>
    </div>
    <div class="form-group">
        <label class="form-label">Language</label>
        <select class="form-control"><option>English</option><option>বাংলা</option></select>
    </div>
</div>

<div class="card" style="max-width: 640px;">
    <div class="card-header"><h4>Notifications</h4></div>
    <label class="form-check" style="margin-bottom: 12px;"><input type="checkbox" checked/> Budget alerts</label><br/>
    <label class="form-check" style="margin-bottom: 12px;"><input type="checkbox" checked/> Monthly report ready</label><br/>
    <label class="form-check"><input type="checkbox"/> Goal progress updates</label>
</div>

</th:block>

</body>
</html>
