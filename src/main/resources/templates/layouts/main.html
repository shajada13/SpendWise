<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:fragment="head(title)" th:text="${title} + ' - SpendWise'">SpendWise</title>
</head>
<body>

<!--
  This file defines the shared page shell used by every authenticated screen.
  Consuming pages implement th:fragment="content" and are included via
  th:replace="~{layouts/main :: layout(~{::content}, 'dashboard', 'Dashboard')}"
-->
<div th:fragment="layout(content, active, pageTitle)">
    <!DOCTYPE html>
    <html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title th:text="${pageTitle} + ' - SpendWise'">SpendWise</title>

        <link rel="icon" th:href="@{/images/logo/logo-mark.svg}"/>

        <!-- Bootstrap 5 -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>

        <!-- Google Font: Inter -->
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

        <!-- SpendWise Design System -->
        <link rel="stylesheet" th:href="@{/css/variables.css}"/>
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
        <link rel="stylesheet" th:href="@{/css/components.css}"/>
        <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
        <link rel="stylesheet" th:href="@{/css/responsive.css}"/>
    </head>
    <body>

        <div class="app-shell">

            <div th:replace="~{fragments/sidebar :: sidebar(${active})}"></div>

            <div class="main-content">
                <div th:replace="~{fragments/header :: header}"></div>

                <div class="content-area">
                    <div th:replace="${content}"></div>
                </div>

                <div th:replace="~{fragments/footer :: footer}"></div>
            </div>

        </div>

        <div th:replace="~{fragments/toast :: toastContainer}"></div>

        <!-- Bootstrap Bundle JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Chart.js -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

        <!-- Lucide Icons -->
        <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

        <!-- SpendWise Scripts -->
        <script th:src="@{/js/app.js}"></script>
        <script th:src="@{/js/validation.js}"></script>
        <th:block th:if="${active == 'dashboard'}">
            <script th:src="@{/js/dashboard.js}"></script>
        </th:block>

    </body>
    </html>
</div>

</body>
</html>
