<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Shared shell for unauthenticated pages (login, register, forgot password).
  Usage: th:replace="~{layouts/auth :: layout(~{::content}, 'Log In')}"
-->
<div th:fragment="layout(content, pageTitle)">
    <!DOCTYPE html>
    <html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title th:text="${pageTitle} + ' - SpendWise'">SpendWise</title>

        <link rel="icon" th:href="@{/images/logo/logo-mark.svg}"/>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

        <link rel="stylesheet" th:href="@{/css/variables.css}"/>
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
        <link rel="stylesheet" th:href="@{/css/components.css}"/>
        <link rel="stylesheet" th:href="@{/css/responsive.css}"/>
    </head>
    <body>

        <div th:replace="${content}"></div>

        <div th:replace="~{fragments/toast :: toastContainer}"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Lucide Icons -->
        <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

        <script th:src="@{/js/app.js}"></script>
        <script th:src="@{/js/validation.js}"></script>

    </body>
    </html>
</div>

</body>
</html>
