# ================================================================
# SpendWise - Application Configuration
# ================================================================

spring.application.name=SpendWise
server.port=8080

# ----------------------------------------------------------------
# DATASOURCE
# ----------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/spendwise_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=SpendWiseHikariPool
spring.datasource.hikari.max-lifetime=1200000

# ----------------------------------------------------------------
# JPA / HIBERNATE
# ----------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ----------------------------------------------------------------
# THYMELEAF
# ----------------------------------------------------------------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# ----------------------------------------------------------------
# STATIC RESOURCES
# ----------------------------------------------------------------
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# ----------------------------------------------------------------
# SESSION
# ----------------------------------------------------------------
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=SPENDWISE_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ----------------------------------------------------------------
# FILE UPLOAD
# ----------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ----------------------------------------------------------------
# JACKSON
# ----------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ----------------------------------------------------------------
# LOGGING
# ----------------------------------------------------------------
logging.level.root=INFO
logging.level.com.spendwise=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ----------------------------------------------------------------
# ERROR
# ----------------------------------------------------------------
server.error.include-message=always
server.error.include-binding-errors=always
server.error.whitelabel.enabled=false
