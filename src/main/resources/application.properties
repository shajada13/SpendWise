# ================================================================
# SpendWise - Application Properties
# Phase 3 - Spring Boot Project Setup
# ================================================================

# ----------------------------------------------------------------
# SERVER CONFIGURATION
# ----------------------------------------------------------------
server.port=8080
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ----------------------------------------------------------------
# APPLICATION INFO
# ----------------------------------------------------------------
spring.application.name=SpendWise
spring.profiles.active=dev

# ----------------------------------------------------------------
# DATABASE CONFIGURATION (MySQL)
# ----------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/spendwise_db?useSSL=false&serverTimezone=Asia/Dhaka&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.pool-name=SpendWisePool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ----------------------------------------------------------------
# JPA & HIBERNATE CONFIGURATION
# ----------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Dhaka
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.open-in-view=false

# ----------------------------------------------------------------
# THYMELEAF CONFIGURATION
# ----------------------------------------------------------------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.servlet.content-type=text/html

# ----------------------------------------------------------------
# STATIC RESOURCES
# ----------------------------------------------------------------
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600
spring.mvc.static-path-pattern=/static/**

# ----------------------------------------------------------------
# FILE UPLOAD CONFIGURATION
# ----------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# ----------------------------------------------------------------
# SECURITY CONFIGURATION
# ----------------------------------------------------------------
spring.security.user.name=admin
spring.security.user.password=admin123

# ----------------------------------------------------------------
# JWT CONFIGURATION
# ----------------------------------------------------------------
app.jwt.secret=SpendWise2024SecretKeyForJWTTokenGenerationAndValidationMustBe256BitsLong!
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000
app.jwt.token-prefix=Bearer
app.jwt.header=Authorization

# ----------------------------------------------------------------
# LOGGING CONFIGURATION
# ----------------------------------------------------------------
logging.level.root=INFO
logging.level.com.spendwise=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/spendwise.log
logging.file.max-size=10MB
logging.file.max-history=30

# ----------------------------------------------------------------
# TIMEZONE CONFIGURATION
# ----------------------------------------------------------------
spring.jackson.time-zone=Asia/Dhaka
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

# ----------------------------------------------------------------
# ERROR HANDLING
# ----------------------------------------------------------------
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
server.error.whitelabel.enabled=false

# ----------------------------------------------------------------
# APP CUSTOM PROPERTIES
# ----------------------------------------------------------------
app.name=SpendWise
app.version=1.0.0
app.currency=BDT
app.currency-symbol=\u09F3
app.timezone=Asia/Dhaka
app.upload.dir=uploads/
app.upload.avatars=uploads/avatars/
