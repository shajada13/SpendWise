# ================================================================
# SpendWise - Production Configuration
# Activate with: --spring.profiles.active=prod
# ================================================================

# Datasource — use environment variables in production
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/spendwise_db}
spring.datasource.username=${DB_USERNAME:spendwise_user}
spring.datasource.password=${DB_PASSWORD:strongpassword}

# JPA — no DDL changes in production
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Thymeleaf — enable cache in production
spring.thymeleaf.cache=true

# Logging — less verbose in production
logging.level.root=WARN
logging.level.com.spendwise=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Secure cookies in production (HTTPS required)
server.servlet.session.cookie.secure=true
