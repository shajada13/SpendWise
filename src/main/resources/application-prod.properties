# =========================================================
# SpendWise - Production Profile
# =========================================================

# -------------------- Database (MySQL) --------------------
spring.datasource.url=${SPENDWISE_DB_URL:jdbc:mysql://localhost:3306/spendwise_db?useUnicode=true&characterEncoding=UTF-8&useSSL=true&serverTimezone=UTC}
spring.datasource.username=${SPENDWISE_DB_USERNAME:spendwise_user}
spring.datasource.password=${SPENDWISE_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------- JPA / Hibernate --------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# -------------------- Logging --------------------
logging.level.root=WARN
logging.level.com.spendwise=INFO

# -------------------- Thymeleaf (production caching) --------------------
spring.thymeleaf.cache=true

# -------------------- DevTools --------------------
spring.devtools.restart.enabled=false
