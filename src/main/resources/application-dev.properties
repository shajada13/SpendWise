# =========================================================
# SpendWise - Development Profile
# =========================================================

# -------------------- Database (MySQL) --------------------
spring.datasource.url=jdbc:mysql://localhost:3306/spendwise_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------- JPA / Hibernate --------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# -------------------- Logging --------------------
logging.level.root=INFO
logging.level.com.spendwise=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# -------------------- DevTools --------------------
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
