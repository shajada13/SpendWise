# ================================================================
# SpendWise - Development Environment Properties
# ================================================================

# Dev Database (change as needed)
spring.datasource.url=jdbc:mysql://localhost:3306/spendwise_db?useSSL=false&serverTimezone=Asia/Dhaka&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root

# Show SQL in dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf cache off in dev (hot reload)
spring.thymeleaf.cache=false

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Debug logging in dev
logging.level.com.spendwise=DEBUG
logging.level.org.springframework.security=DEBUG
